<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael Arns</title>
  <meta name="description" content="Hier entsteht eine neue Präsenz von Michael Arns." />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Michael Arns" />
  <meta property="og:description" content="Hier entsteht eine neue Präsenz." />
  <meta property="og:locale" content="de_DE" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' text-anchor='middle' x='50'>&#42;</text></svg>" />

  <style>
    :root {
      --bg: #0b0d12;
      --bg-soft: #12151d;
      --fg: #f3f4f6;
      --muted: #8b91a1;
      --accent: #c9a96a;
      --accent-soft: rgba(201, 169, 106, 0.14);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 50% -10%, var(--accent-soft), transparent 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--fg);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Sanftes Rauschen / Tiefe */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(900px 500px at 50% 120%, rgba(255,255,255,0.03), transparent 70%);
      pointer-events: none;
    }

    main {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
      animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .mark {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      line-height: 1;
      color: var(--accent);
      display: inline-block;
      margin-bottom: 1.75rem;
      animation: spin 24s linear infinite;
      user-select: none;
    }

    h1 {
      font-weight: 600;
      letter-spacing: 0.04em;
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 1rem;
    }

    .tagline {
      color: var(--muted);
      font-size: clamp(1rem, 2.6vw, 1.25rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      max-width: 30ch;
      margin: 0 auto;
    }

    .divider {
      width: 56px;
      height: 1px;
      margin: 2.25rem auto 0;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.7;
    }

    footer {
      position: fixed;
      bottom: 1.75rem;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      z-index: 1;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--accent);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      main { animation: none; }
      .mark { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">&#42;</div>
    <h1>Michael Arns</h1>
    <p class="tagline">Hier entsteht eine neue Präsenz.</p>
    <div class="divider" aria-hidden="true"></div>
  </main>

  <footer>
    <a href="mailto:michael.arns@almato.com">michaelarns.com</a>
  </footer>
</body>
</html>
